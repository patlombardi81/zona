# GitHub Action: refresh DASH playlist every 6 hours
#
# Reads config from the CONFIG_JSON repository secret, generates the
# playlist with fresh tokens, and commits the result.
#
# Setup:
#   1. Copy config.example.json content
#   2. Replace values with your real provider details
#   3. In GitHub repo: Settings → Secrets and variables → Actions →
#      New repository secret → Name: CONFIG_JSON → paste your config

name: Refresh Playlist

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Manual trigger from Actions tab
  push:
    branches:
      - main
      - master
    paths:
      - 'generate_m3u.py'
      - 'config.example.json'
      - '.github/workflows/refresh.yml'

permissions:
  contents: write  # Required for auto-commit

concurrency:
  group: refresh-playlist
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generator
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: python generate_m3u.py

      - name: Show stats
        run: |
          echo "=== Output files ==="
          ls -la playlist.m3u 2>/dev/null || echo "Missing playlist.m3u"
          echo
          echo "=== Stats ==="
          echo "Channels: $(grep -c '^#EXTINF' playlist.m3u 2>/dev/null || echo 0)"
          echo "KODIPROP directives: $(grep -c '^#KODIPROP' playlist.m3u 2>/dev/null || echo 0)"
          echo "ClearKey streams: $(grep -c 'license_type=clearkey' playlist.m3u 2>/dev/null || echo 0)"
          echo "Groups: $(grep -c '^# ===' playlist.m3u 2>/dev/null || echo 0)"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          if git diff --staged --quiet; then
            echo "No changes, skipping commit."
          else
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "Auto-refresh playlist - ${TIMESTAMP}"
            git push
            echo "Commit pushed successfully."
          fi
